<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nursing Care Tracker{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <style>
        :root {
            --primary-bg: #e0eafc;
            --secondary-bg: #cfdef3;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            background-attachment: fixed;
            min-height: 100vh;
            color: #2c3e50;
        }

        /* Glassmorphism Navbar */
        .navbar-glass {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 1000;
        }
        
        .navbar-glass .navbar-brand {
            color: #0d6efd;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
        }

        /* Custom Table Styling */
        .table {
            --bs-table-bg: transparent;
            --bs-table-striped-bg: rgba(255, 255, 255, 0.3);
            --bs-table-hover-bg: rgba(255, 255, 255, 0.5);
            color: #2c3e50;
        }
        
        .table > :not(caption) > * > * {
            border-bottom-color: rgba(0,0,0,0.05);
            padding: 1rem 0.75rem;
        }

        /* Animated Buttons */
        .btn-glass {
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .btn-glass:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 110, 255, 0.2);
        }

        /* Inputs */
        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            border-color: rgba(13, 110, 253, 0.5);
        }

        /* Badges */
        .badge {
            font-weight: 500;
            padding: 0.5em 1em;
            letter-spacing: 0.3px;
        }
        
        /* Modal Glass */
        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }
        
        .modal-header {
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .modal-footer {
            border-top: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-glass mb-4 sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fs-4" href="/">
      <span class="fs-4 me-2">⚕️</span> Nursing Care Tracker
    </a>
  </div>
</nav>

<div class="container pb-5">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
